<header class="bg-primary shadow-lg sticky top-0 z-50">
    <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center py-4">
        <a href="#hero" class="flex items-center">
            <img src="Logo.png" alt="Bricks & Woods Logo" class="h-10">
        </a>

        <div class="hidden md:flex space-x-8">
            <a href="#services" class="text-white hover:text-accent transition duration-300">Services</a>
            <a href="#values" class="text-white hover:text-accent transition duration-300">Our Values</a>
            <a href="#gallery" class="text-white hover:text-accent transition duration-300">Gallery</a>
        </div>

        <a href="#contact" class="hidden md:block bg-accent text-white font-semibold py-2 px-4 rounded-lg shadow-md hover:bg-accent-dark transition duration-300 transform hover:scale-105">
            Get a Quote <img src="Whatsapp-icon.svg" alt="WhatsApp" class="inline h-5 w-5 ml-2">
        </a>

        <button (click)="toggleMenu()" class="md:hidden text-white focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </nav>
</header>

<div [class.hidden]="!isMenuOpen" class="md:hidden bg-primary w-full shadow-lg z-40 absolute">
    <div class="flex flex-col p-4 space-y-3">
        <a href="#services" class="text-white hover:text-accent py-2" (click)="toggleMenu()">Services</a>
        <a href="#values" class="text-white hover:text-accent py-2" (click)="toggleMenu()">Our Values</a>
        <a href="#gallery" class="text-white hover:text-accent py-2" (click)="toggleMenu()">Gallery</a>
        <a href="#contact" class="bg-accent text-white font-semibold py-3 px-4 rounded-lg text-center mt-2" (click)="toggleMenu()">
            Get a Quote <img src="Whatsapp-icon.svg" alt="WhatsApp" class="inline h-5 w-5 ml-2">
        </a>
    </div>
</div>
