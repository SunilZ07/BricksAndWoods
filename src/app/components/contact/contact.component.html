<section id="contact" class="py-16 md:py-24 bg-gray-50">
    <div class="max-w-xl mx-auto px-4 sm:px-6 lg:px-8">
        <h2 class="text-4xl font-extrabold text-primary text-center mb-6">Ready to Build your Home ?</h2>
        <p class="text-center text-lg text-gray-600 mb-10">Tell us about your project below and receive a quote via WhatsApp or a call within 1-2 hours.</p>

        <form (ngSubmit)="submitForm()" class="bg-white p-8 rounded-xl shadow-2xl space-y-4">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700">Your Good Name</label>
                <input type="text" id="name" name="name" [(ngModel)]="name" required class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm p-3 focus:ring-accent focus:border-accent">
            </div>
            <div>
                <label for="project" class="block text-sm font-medium text-gray-700">Project Details (e.g., Tiling for 3 rooms, Full Interior Renovation)</label>
                <textarea id="project" name="project" [(ngModel)]="project" rows="4" required class="mt-1 block w-full border border-gray-300 rounded-lg shadow-sm p-3 focus:ring-accent focus:border-accent"></textarea>
            </div>
            
            <button type="submit" [disabled]="isLoading" class="w-full bg-primary text-white font-bold py-3 rounded-lg shadow-md transition duration-300 hover:bg-accent transform hover:scale-[1.01] hover:shadow-lg disabled:opacity-75">
                {{ buttonText }} 
                <img *ngIf="!isLoading" src="Whatsapp-icon.svg" alt="WhatsApp" class="inline h-5 w-5 ml-2">
            </button>
            
            <p class="text-center text-sm text-gray-600 mt-2">We won’t spam you — pinky promise 😊</p>
        </form>
    </div>
</section>
